<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — Access Required</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg:      #0b0e12;
    --surface: #131720;
    --border:  #1e2535;
    --accent:  #5b7fa6;   /* steel blue */
    --accent2: #7fa8c9;   /* lighter blue for hover/subtle */
    --text:    #d8dde8;
    --muted:   #5a6275;
    --subtle:  #8a93a8;
    --error:   #b85c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }

  /* ── PIN SCREEN ── */
  #pin-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 2rem; padding: 2rem;
  }
  .lock-icon {
    width: 62px; height: 62px; border: 1.5px solid var(--accent);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; color: var(--accent); font-size: 1.25rem;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(91,127,166,0.3); }
    50%      { box-shadow: 0 0 0 14px rgba(91,127,166,0); }
  }
  .pin-title {
    font-family: 'Cormorant Garamond', serif; font-size: 1.25rem;
    font-weight: 300; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
  }
  .pin-input-wrap { display: flex; gap: 0.55rem; }
  .pin-input-wrap input {
    width: 3rem; height: 3.6rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 4px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 1.5rem; text-align: center;
    outline: none; transition: border-color 0.2s;
    -webkit-text-security: disc; caret-color: var(--accent);
  }
  .pin-input-wrap input:focus { border-color: var(--accent); }
  .pin-input-wrap.error input { border-color: var(--error); animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); }
  }
  .pin-hint { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; height: 1rem; }
  .pin-hint.err { color: var(--error); }
  .unlock-btn {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.18em;
    text-transform: uppercase; padding: 0.75rem 2.2rem; cursor: pointer;
    transition: background 0.2s, color 0.2s; border-radius: 2px;
  }
  .unlock-btn:hover { background: var(--accent); color: var(--bg); }

  /* ── CV SCREEN ── */
  #cv-screen { display: none; width: 100%; max-width: 900px; margin: 0 auto; padding: 4rem 2rem 6rem; animation: fadeIn 0.7s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .cv-header {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2.5rem; margin-bottom: 3rem;
  }
  .cv-photo { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--border); filter: grayscale(15%); }
  .cv-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 300; letter-spacing: 0.06em; line-height: 1; color: var(--text); }
  .cv-name span { color: var(--accent2); }
  .cv-contacts { display: flex; flex-direction: column; align-items: flex-end; gap: 0.45rem; }
  .cv-contacts a { font-size: 0.67rem; color: var(--muted); text-decoration: none; letter-spacing: 0.06em; display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
  .cv-contacts a:hover { color: var(--accent2); }
  .cv-contacts a i { font-size: 0.68rem; }
  .print-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.95rem; padding: 0; transition: color 0.2s; margin-top: 0.5rem; align-self: flex-end; }
  .print-btn:hover { color: var(--accent2); }

  .cv-section { margin-bottom: 3rem; }
  .section-title {
    font-family: 'Cormorant Garamond', serif; font-size: 0.6rem; font-weight: 600;
    letter-spacing: 0.32em; text-transform: uppercase; color: var(--accent);
    margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .cv-summary { font-size: 0.77rem; line-height: 1.95; color: var(--subtle); max-width: 700px; }

  .skills-grid { display: flex; flex-wrap: wrap; gap: 0.45rem; }
  .skill-tag { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--border); padding: 0.28rem 0.75rem; border-radius: 2px; color: var(--muted); transition: border-color 0.2s, color 0.2s; }
  .skill-tag:hover { border-color: var(--accent); color: var(--accent2); }

  .exp-item { margin-bottom: 2.4rem; padding-bottom: 2.4rem; border-bottom: 1px solid var(--border); }
  .exp-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .exp-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.25rem; }
  .exp-company { font-family: 'Cormorant Garamond', serif; font-size: 1.08rem; font-weight: 600; color: var(--text); letter-spacing: 0.03em; text-decoration: none; transition: color 0.2s; }
  .exp-company:hover { color: var(--accent2); }
  .exp-date { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; white-space: nowrap; }
  .exp-role { font-size: 0.64rem; color: var(--accent); letter-spacing: 0.13em; text-transform: uppercase; margin-bottom: 0.65rem; }
  .exp-bullets { list-style: none; padding: 0; }
  .exp-bullets li { font-size: 0.73rem; line-height: 1.85; color: var(--subtle); padding-left: 1.1rem; position: relative; }
  .exp-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--border); }

  .edu-item { margin-bottom: 1.8rem; }
  .edu-item:last-child { margin-bottom: 0; }
  .edu-degree { font-family: 'Cormorant Garamond', serif; font-size: 1.03rem; font-weight: 600; color: var(--text); text-decoration: none; transition: color 0.2s; display: inline-block; }
  .edu-degree:hover { color: var(--accent2); }
  .edu-school { font-size: 0.64rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin: 0.2rem 0 0.12rem; }
  .edu-date { font-size: 0.62rem; color: var(--muted); margin-bottom: 0.45rem; }
  .edu-bullets { list-style: none; padding: 0; }
  .edu-bullets li { font-size: 0.73rem; line-height: 1.85; color: var(--subtle); padding-left: 1.1rem; position: relative; }
  .edu-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--border); }
  .edu-bullets a { color: var(--subtle); text-decoration: underline; text-underline-offset: 3px; }
  .edu-bullets a:hover { color: var(--accent2); }

  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 1.6rem; }
  .info-label { font-size: 0.57rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
  .info-value { font-size: 0.73rem; color: var(--text); line-height: 1.85; }
  .info-value a { color: var(--subtle); text-decoration: underline; text-underline-offset: 3px; }
  .info-value a:hover { color: var(--accent2); }

  @media (max-width: 620px) {
    .cv-header { grid-template-columns: auto 1fr; }
    .cv-contacts { grid-column: 1 / -1; align-items: flex-start; }
  }

  /* ── PRINT ── */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background: #ffffff !important; color: #1a1e28 !important; font-size: 9pt; }
    #pin-screen { display: none !important; }
    #cv-screen { display: block !important; max-width: 100%; padding: 0; margin: 0; animation: none; }
    @page { size: A4; margin: 12mm 15mm 10mm 15mm; }

    .cv-header { gap: 1rem; padding-bottom: 8pt; margin-bottom: 10pt; border-bottom: 1.5px solid #b0bcd0; grid-template-columns: auto 1fr auto; }
    .cv-photo { width: 56px; height: 56px; filter: none; border: 1px solid #c5cdd8; }
    .cv-name { font-size: 21pt; color: #1a1e28; }
    .cv-name span { color: #2f5a8a; }
    .cv-contacts { gap: 2pt; }
    .cv-contacts a { font-size: 7.5pt; color: #3a4a5c; gap: 3pt; }
    .print-btn { display: none; }

    .cv-section { margin-bottom: 9pt; }
    .section-title { font-size: 6pt; color: #2f5a8a; margin-bottom: 5pt; letter-spacing: 0.25em; }
    .section-title::after { background: #b0bcd0; }
    .cv-summary { font-size: 7.8pt; line-height: 1.55; color: #2e3545; max-width: 100%; }

    .skills-grid { gap: 3pt; }
    .skill-tag { font-size: 6.5pt; padding: 2pt 5pt; border: 1px solid #b0bcd0; color: #3a4a5c; border-radius: 2px; }

    .exp-item { margin-bottom: 7pt; padding-bottom: 7pt; border-bottom: 1px solid #dde3ec; }
    .exp-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .exp-company { font-size: 10pt; color: #1a1e28; }
    .exp-date { font-size: 7pt; color: #5a6880; }
    .exp-role { font-size: 6.5pt; color: #2f5a8a; margin-bottom: 3pt; }
    .exp-bullets li { font-size: 7.5pt; line-height: 1.5; color: #2e3545; padding-left: 9pt; }
    .exp-bullets li::before { color: #b0bcd0; }

    .edu-item { margin-bottom: 7pt; }
    .edu-degree { font-size: 9.5pt; color: #1a1e28; }
    .edu-school { font-size: 6.5pt; color: #2f5a8a; }
    .edu-date { font-size: 7pt; color: #5a6880; margin-bottom: 2pt; }
    .edu-bullets li { font-size: 7.5pt; line-height: 1.5; color: #2e3545; padding-left: 9pt; }
    .edu-bullets li::before { color: #b0bcd0; }
    .edu-bullets a { color: #3a4a5c; }

    .info-grid { grid-template-columns: repeat(4, 1fr); gap: 0.7rem; }
    .info-label { font-size: 6pt; color: #5a6880; margin-bottom: 2pt; }
    .info-value { font-size: 7.5pt; line-height: 1.55; color: #1a1e28; }
    .info-value a { color: #3a4a5c; }

    .exp-item, .edu-item, .cv-section { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="lock-icon"><i class="fa-solid fa-lock"></i></div>
  <div class="pin-title">Access Required</div>
  <div class="pin-input-wrap" id="pin-wrap">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
  </div>
  <div class="pin-hint" id="pin-hint">enter your access code</div>
  <button class="unlock-btn" onclick="unlock()">Unlock</button>
</div>

<!-- CV SCREEN — fully empty until decrypted -->
<div id="cv-screen">
  <div class="cv-header">
    <img src="9.jpg" alt="" class="cv-photo">
    <div class="cv-name" id="cv-name"></div>
    <div class="cv-contacts" id="cv-contacts"></div>
  </div>
  <div id="cv-body"></div>
</div>

  };

  const digits = document.querySelectorAll('.pin-digit');
  digits.forEach((input, i) => {
    input.addEventListener('input', () => {
      if (input.value.length === 1) {
        if (i < digits.length - 1) digits[i + 1].focus();
        else unlock();
      }
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !input.value && i > 0) { digits[i - 1].focus(); digits[i - 1].value = ''; }
      if (e.key === 'Enter') unlock();
    });
  });
  digits[0].focus();

  async function unlock() {
    const pin = Array.from(digits).map(d => d.value).join('');
    if (pin.length < 6) { showHint('please enter all 6 digits', true); return; }
    try {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pin), { name: 'PBKDF2' }, false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: hexToBytes(ENCRYPTED.salt), iterations: 100000, hash: 'SHA-256' },
        keyMaterial, { name: 'AES-CBC', length: 256 }, false, ['decrypt']
      );
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-CBC', iv: hexToBytes(ENCRYPTED.iv) },
        key, base64ToBytes(ENCRYPTED.data)
      );
      renderCV(new TextDecoder().decode(decrypted));
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('cv-screen').style.display = 'block';
      window.scrollTo(0, 0);
    } catch (e) {
      const wrap = document.getElementById('pin-wrap');
      wrap.classList.add('error');
      showHint('incorrect code — try again', true);
      setTimeout(() => {
        wrap.classList.remove('error');
        digits.forEach(d => d.value = '');
        digits[0].focus();
        showHint('enter your access code', false);
      }, 1200);
    }
  }

  function hexToBytes(hex) {
    const arr = new Uint8Array(hex.length / 2);
    for (let i = 0; i < hex.length; i += 2) arr[i / 2] = parseInt(hex.substr(i, 2), 16);
    return arr;
  }
  function base64ToBytes(b64) {
    const bin = atob(b64); const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }
  function showHint(msg, isError) {
    const hint = document.getElementById('pin-hint');
    hint.textContent = msg;
    hint.className = 'pin-hint' + (isError ? ' err' : '');
  }

  function renderCV(text) {
    const sections = text.split('\n\n');

    // Header: FIRSTNAME|LASTNAME|EMAIL:...|PHONE:...|LINKEDIN:...
    const h = sections[0].split('|');
    const firstName = h[0];
    const lastName  = h[1];
    const email     = h[2].replace('EMAIL:', '');
    const phone     = h[3].replace('PHONE:', '');
    const linkedin  = h[4].replace('LINKEDIN:', '');

    document.getElementById('cv-name').innerHTML = `${firstName}<br><span>${lastName}</span>`;
    document.getElementById('cv-contacts').innerHTML = `
      <a href="mailto:${email}"><i class="fa-solid fa-envelope"></i> ${email}</a>
      <a href="tel:${phone}"><i class="fa-solid fa-phone"></i> ${phone}</a>
      <a href="${linkedin}" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
      <button class="print-btn" onclick="window.print()" title="Print / Save as PDF"><i class="fa-solid fa-print"></i></button>
    `;

    let html = '';

    // Profile
    html += `<div class="cv-section"><div class="section-title">Profile</div>
      <p class="cv-summary">${sections[1].replace('PROFILE\n','')}</p></div>`;

    // Skills
    const skills = sections[2].replace('SKILLS\n','').split('|');
    html += `<div class="cv-section"><div class="section-title">Skills &amp; Capabilities</div><div class="skills-grid">`;
    skills.forEach(s => { html += `<span class="skill-tag">${s.trim()}</span>`; });
    html += `</div></div>`;

    // Experience
    const expLines = sections[3].replace('EXPERIENCE\n','').split('\n');
    html += `<div class="cv-section"><div class="section-title">Experience</div>`;
    expLines.forEach(line => {
      const parts = line.split('|');
      if (parts.length < 3) return;
      const [company, url, date, role, ...bullets] = parts;
      html += `<div class="exp-item"><div class="exp-header">
        <a class="exp-company" href="${url}" target="_blank">${company}</a>
        <span class="exp-date">${date}</span></div>
        <div class="exp-role">${role||''}</div>`;
      if (bullets.length) {
        html += `<ul class="exp-bullets">`;
        bullets.forEach(b => { if(b.trim()) html += `<li>${b.trim()}</li>`; });
        html += `</ul>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

    // Education
    const eduLines = sections[4].replace('EDUCATION\n','').split('\n');
    html += `<div class="cv-section"><div class="section-title">Education</div>`;
    eduLines.forEach(line => {
      const parts = line.split('|');
      if (parts.length < 4) return;
      const [degree, url, school, date, ...notes] = parts;
      html += `<div class="edu-item">
        <a class="edu-degree" href="${url}" target="_blank">${degree}</a>
        <div class="edu-school">${school}</div>
        <div class="edu-date">${date}</div>`;
      if (notes.length) {
        html += `<ul class="edu-bullets">`;
        // Group notes: if a note starts with https://, it's a link for the previous bullet
        let pendingLink = null;
        const noteList = notes.filter(n => n.trim());
        noteList.forEach((n, idx) => {
          if (n.trim().startsWith('http')) {
            // This is a URL for the previous bullet — already handled below, skip
            return;
          }
          // Check if next item is a URL (link for this bullet)
          const next = noteList[idx + 1];
          if (next && next.trim().startsWith('http')) {
            html += `<li><a href="${next.trim()}" target="_blank">${n.trim()}</a></li>`;
          } else {
            html += `<li>${n.trim()}</li>`;
          }
        });
        html += `</ul>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

    // Info
    const infoLines = sections[5].replace('INFO\n','').split('\n');
    html += `<div class="cv-section"><div class="section-title">Additional Information &amp; Technical Skills</div><div class="info-grid">`;
    infoLines.forEach(line => {
      const [label, ...rest] = line.split(': ');
      let value = rest.join(': ');
      const certMatch = value.match(/^(.+)\|(.+)$/);
      if (certMatch) value = `<a href="${certMatch[2]}" target="_blank">${certMatch[1]}</a>`;
      html += `<div><div class="info-label">${label}</div><div class="info-value">${value}</div></div>`;
    });
    html += `</div></div>`;

    document.getElementById('cv-body').innerHTML = html;
  }
</script>
</body>
</html>
