<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>David Palfrader - CV</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
  --bg:#0f1115;
  --surface:#171a20;
  --surface-2:#1d2128;

  --border:#2b3139;
  --border-soft:rgba(255,255,255,0.05);

  --accent:#c7a46a;
  --accent-light:#e2c898;

  --text:#f3f2ef;
  --muted:#8e949c;
  --subtle:#b8bec6;

  --error:#d96b6b;

  --shadow:
    0 10px 30px rgba(0,0,0,0.35),
    0 30px 80px rgba(0,0,0,0.25);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:
    radial-gradient(circle at top left, rgba(199,164,106,0.07), transparent 28%),
    radial-gradient(circle at bottom right, rgba(199,164,106,0.04), transparent 24%),
    var(--bg);

  color:var(--text);

  font-family:'DM Mono', monospace;

  min-height:100vh;

  letter-spacing:0.01em;
}

/* =========================================
   PIN SCREEN
========================================= */

#pin-screen{
  min-height:100vh;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:2rem;

  padding:2rem;
}

.lock-icon{
  width:70px;
  height:70px;

  border-radius:50%;

  border:1px solid rgba(199,164,106,0.35);

  display:flex;
  align-items:center;
  justify-content:center;

  color:var(--accent-light);

  font-size:1.3rem;

  background:rgba(199,164,106,0.05);

  animation:pulse 3s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{
    box-shadow:0 0 0 0 rgba(199,164,106,0.25);
  }

  50%{
    box-shadow:0 0 0 18px rgba(199,164,106,0);
  }
}

.pin-title{
  font-family:'Cormorant Garamond', serif;

  font-size:1.4rem;

  font-weight:300;

  letter-spacing:0.22em;

  color:var(--muted);

  text-transform:uppercase;
}

.pin-input-wrap{
  display:flex;
  gap:0.7rem;
}

.pin-input-wrap input{
  width:3rem;
  height:3.7rem;

  background:rgba(255,255,255,0.03);

  border:1px solid var(--border);

  border-radius:10px;

  color:var(--text);

  font-size:1.4rem;

  text-align:center;

  outline:none;

  transition:all .25s ease;

  -webkit-text-security:disc;

  caret-color:var(--accent);
}

.pin-input-wrap input:focus{
  border-color:rgba(199,164,106,0.4);

  background:rgba(255,255,255,0.05);

  box-shadow:0 0 0 4px rgba(199,164,106,0.08);
}

.pin-input-wrap.error input{
  border-color:var(--error);

  animation:shake .3s ease;
}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}

.pin-hint{
  font-size:.68rem;

  color:var(--muted);

  letter-spacing:.12em;

  height:1rem;

  text-transform:uppercase;
}

.pin-hint.err{
  color:var(--error);
}

.unlock-btn{
  border:none;

  padding:.9rem 2.5rem;

  border-radius:999px;

  background:rgba(199,164,106,0.08);

  border:1px solid rgba(199,164,106,0.2);

  color:var(--accent-light);

  font-family:'DM Mono', monospace;

  font-size:.72rem;

  letter-spacing:.18em;

  text-transform:uppercase;

  cursor:pointer;

  transition:all .25s ease;
}

.unlock-btn:hover{
  transform:translateY(-2px);

  background:rgba(199,164,106,0.15);

  border-color:rgba(199,164,106,0.45);

  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* =========================================
   CV SCREEN
========================================= */

#cv-screen{
  display:none;

  width:100%;
  max-width:940px;

  margin:3rem auto;

  padding:4rem 3rem 5rem;

  background:rgba(23,26,32,0.88);

  backdrop-filter:blur(14px);

  border:1px solid var(--border-soft);

  border-radius:28px;

  box-shadow:var(--shadow);

  animation:fadeIn .7s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(24px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================================
   HEADER
========================================= */

.cv-header{
  display:grid;

  grid-template-columns:auto 1fr auto;

  align-items:center;

  gap:2.5rem;

  padding-bottom:2.2rem;

  margin-bottom:3rem;

  border-bottom:1px solid rgba(255,255,255,0.06);
}

.cv-photo{
  width:96px;
  height:96px;

  border-radius:50%;

  object-fit:cover;

  border:2px solid rgba(199,164,106,0.25);

  box-shadow:
    0 0 0 6px rgba(199,164,106,0.04),
    0 10px 30px rgba(0,0,0,0.35);

  filter:grayscale(10%);
}

.cv-name{
  font-family:'Cormorant Garamond', serif;

  font-size:clamp(2.4rem, 5vw, 3.8rem);

  font-weight:400;

  letter-spacing:.08em;

  line-height:.95;
}

.cv-name span{
  color:var(--accent-light);
}

.cv-contacts{
  display:flex;
  flex-direction:column;
  align-items:flex-end;

  gap:.55rem;
}

.cv-contacts a{
  font-size:.72rem;

  color:var(--muted);

  text-decoration:none;

  letter-spacing:.08em;

  display:flex;
  align-items:center;
  gap:.55rem;

  transition:all .25s ease;
}

.cv-contacts a:hover{
  color:var(--accent-light);

  transform:translateX(2px);
}

.cv-contacts i{
  font-size:.75rem;
}

.print-btn{
  width:38px;
  height:38px;

  border-radius:50%;

  border:1px solid rgba(199,164,106,0.18);

  background:rgba(199,164,106,0.08);

  color:var(--muted);

  cursor:pointer;

  transition:all .25s ease;

  margin-top:.5rem;
}

.print-btn:hover{
  color:var(--accent-light);

  border-color:rgba(199,164,106,0.4);

  background:rgba(199,164,106,0.14);

  transform:translateY(-2px);
}

/* =========================================
   SECTIONS
========================================= */

.cv-section{
  margin-bottom:3rem;
}

.section-title{
  font-family:'Cormorant Garamond', serif;

  font-size:.72rem;

  font-weight:600;

  letter-spacing:.38em;

  text-transform:uppercase;

  color:var(--accent-light);

  margin-bottom:1.7rem;

  display:flex;
  align-items:center;
  gap:1rem;
}

.section-title::after{
  content:'';

  flex:1;

  height:1px;

  background:
    linear-gradient(
      to right,
      rgba(199,164,106,0.35),
      transparent
    );
}

.cv-summary{
  font-size:.8rem;

  line-height:2;

  color:var(--subtle);

  max-width:720px;
}

/* =========================================
   SKILLS
========================================= */

.skills-grid{
  display:flex;
  flex-wrap:wrap;

  gap:.6rem;
}

.skill-tag{
  font-size:.62rem;

  letter-spacing:.12em;

  text-transform:uppercase;

  padding:.45rem .95rem;

  border-radius:999px;

  border:1px solid rgba(199,164,106,0.18);

  background:rgba(199,164,106,0.06);

  color:#d8c09a;

  transition:all .25s ease;
}

.skill-tag:hover{
  border-color:rgba(199,164,106,0.42);

  background:rgba(199,164,106,0.12);

  color:var(--accent-light);

  transform:translateY(-1px);
}

/* =========================================
   EXPERIENCE
========================================= */

.exp-item{
  margin-bottom:1.5rem;

  padding:1.5rem;

  background:rgba(255,255,255,0.02);

  border:1px solid rgba(255,255,255,0.04);

  border-radius:18px;

  transition:
    transform .25s ease,
    border-color .25s ease,
    background .25s ease;
}

.exp-item:hover{
  transform:translateY(-2px);

  border-color:rgba(199,164,106,0.22);

  background:rgba(255,255,255,0.03);
}

.exp-header{
  display:flex;

  justify-content:space-between;

  align-items:baseline;

  flex-wrap:wrap;

  gap:.4rem;

  margin-bottom:.4rem;
}

.exp-company{
  font-family:'Cormorant Garamond', serif;

  font-size:1.18rem;

  font-weight:600;

  color:var(--text);

  text-decoration:none;

  transition:all .25s ease;
}

.exp-company:hover{
  color:var(--accent-light);
}

.exp-date{
  font-size:.64rem;

  color:var(--muted);

  letter-spacing:.12em;

  white-space:nowrap;
}

.exp-role{
  font-size:.64rem;

  color:var(--accent);

  letter-spacing:.18em;

  text-transform:uppercase;

  margin-bottom:.9rem;
}

.exp-bullets{
  list-style:none;
}

.exp-bullets li{
  position:relative;

  padding-left:1.1rem;

  font-size:.76rem;

  line-height:1.9;

  color:var(--subtle);
}

.exp-bullets li::before{
  content:'—';

  position:absolute;

  left:0;

  color:rgba(199,164,106,0.45);
}

/* =========================================
   EDUCATION
========================================= */

.edu-item{
  margin-bottom:1.4rem;

  padding:1.4rem;

  border-radius:18px;

  background:rgba(255,255,255,0.015);

  border:1px solid rgba(255,255,255,0.04);

  transition:all .25s ease;
}

.edu-item:hover{
  border-color:rgba(199,164,106,0.18);

  background:rgba(255,255,255,0.025);
}

.edu-degree{
  font-family:'Cormorant Garamond', serif;

  font-size:1.08rem;

  font-weight:600;

  color:var(--text);

  text-decoration:none;

  transition:all .25s ease;
}

.edu-degree:hover{
  color:var(--accent-light);
}

.edu-school{
  font-size:.65rem;

  color:var(--accent);

  letter-spacing:.12em;

  text-transform:uppercase;

  margin:.35rem 0 .2rem;
}

.edu-date{
  font-size:.63rem;

  color:var(--muted);

  margin-bottom:.6rem;
}

.edu-bullets{
  list-style:none;
}

.edu-bullets li{
  position:relative;

  padding-left:1.1rem;

  font-size:.75rem;

  line-height:1.9;

  color:var(--subtle);
}

.edu-bullets li::before{
  content:'—';

  position:absolute;

  left:0;

  color:rgba(199,164,106,0.45);
}

.edu-bullets a{
  color:var(--subtle);

  text-decoration:underline;

  text-underline-offset:3px;
}

.edu-bullets a:hover{
  color:var(--accent-light);
}

/* =========================================
   INFO GRID
========================================= */

.info-grid{
  display:grid;

  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

  gap:1.4rem;
}

.info-grid > div{
  padding:1.2rem;

  border-radius:16px;

  background:rgba(255,255,255,0.02);

  border:1px solid rgba(255,255,255,0.04);
}

.info-label{
  font-size:.58rem;

  letter-spacing:.24em;

  text-transform:uppercase;

  color:var(--muted);

  margin-bottom:.6rem;
}

.info-value{
  font-size:.74rem;

  line-height:1.85;

  color:var(--text);
}

.info-value a{
  color:var(--subtle);

  text-decoration:underline;

  text-underline-offset:3px;
}

.info-value a:hover{
  color:var(--accent-light);
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:720px){

  #cv-screen{
    margin:1rem;
    padding:2rem 1.5rem 3rem;
  }

  .cv-header{
    grid-template-columns:1fr;

    text-align:center;
  }

  .cv-photo{
    margin:0 auto;
  }

  .cv-contacts{
    align-items:center;
  }

  .cv-name{
    font-size:2.6rem;
  }

  .info-grid{
    grid-template-columns:1fr;
  }
}

/* =========================================
   PRINT
========================================= */

@media print{

  body{
    background:#fff !important;
    color:#111 !important;
  }

  #pin-screen{
    display:none !important;
  }

  #cv-screen{
    display:block !important;

    margin:0;
    padding:0;

    background:#fff !important;

    border:none;

    box-shadow:none;
  }

  .exp-item,
  .edu-item,
  .info-grid > div{
    background:#fff !important;
    border:1px solid #ddd !important;
  }

  .print-btn{
    display:none;
  }

  @page{
    margin:12mm;
    size:A4;
  }
}

</style>
</head>

<body>

<!-- PIN SCREEN -->

<div id="pin-screen">

  <div class="lock-icon">
    <i class="fa-solid fa-lock"></i>
  </div>

  <div class="pin-title">
    Access Required
  </div>

  <div class="pin-input-wrap" id="pin-wrap">

    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">
    <input type="password" maxlength="1" inputmode="numeric" class="pin-digit">

  </div>

  <div class="pin-hint" id="pin-hint">
    enter your access code
  </div>

  <button class="unlock-btn" onclick="unlock()">
    Unlock
  </button>

</div>

<!-- CV SCREEN -->

<div id="cv-screen">

</div>

<script>

const PIN_HASH =
'315b7924897972befced4d452b492c0a9256f4ff3fec9b0fc83e6a1e17bdc50e';

const digits = document.querySelectorAll('.pin-digit');

digits.forEach((input, i) => {

  input.addEventListener('input', () => {

    if (input.value.length === 1) {

      if (i < digits.length - 1) {
        digits[i + 1].focus();
      } else {
        unlock();
      }
    }
  });

  input.addEventListener('keydown', e => {

    if (e.key === 'Backspace' && !input.value && i > 0) {

      digits[i - 1].focus();

      digits[i - 1].value = '';
    }

    if (e.key === 'Enter') {
      unlock();
    }
  });
});

digits[0].focus();

async function unlock(){

  const pin =
    Array.from(digits)
    .map(d => d.value)
    .join('');

  if(pin.length < 6){

    showHint('please enter all 6 digits', true);

    return;
  }

  const encoded = new TextEncoder().encode(pin);

  const hashBuf =
    await crypto.subtle.digest('SHA-256', encoded);

  const hashHex =
    Array.from(new Uint8Array(hashBuf))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');

  if(hashHex === PIN_HASH){

    document.getElementById('pin-screen').style.display = 'none';

    document.getElementById('cv-screen').style.display = 'block';

    window.scrollTo(0,0);

  } else {

    const wrap =
      document.getElementById('pin-wrap');

    wrap.classList.add('error');

    showHint('incorrect code — try again', true);

    setTimeout(() => {

      wrap.classList.remove('error');

      digits.forEach(d => d.value = '');

      digits[0].focus();

      showHint('enter your access code', false);

    }, 1200);
  }
}

function showHint(msg, isError){

  const hint =
    document.getElementById('pin-hint');

  hint.textContent = msg;

  hint.className =
    'pin-hint' + (isError ? ' err' : '');
}

</script>

</body>
</html>
